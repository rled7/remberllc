<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Strand — auto-organize one conversation by topic</title>
<style>
  :root{--bg:#0c0d12;--panel:#15161d;--line:#262838;--fg:#e6e7ee;--mut:#8a8da0;--accent:#7c9cff;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--fg);}
  header{padding:18px 24px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;}
  header h1{font-size:20px;letter-spacing:.5px;}
  header .tag{color:var(--accent);font-weight:600;}
  header .sub{color:var(--mut);font-size:13px;}
  main{display:grid;grid-template-columns:300px 1fr;gap:0;height:calc(100vh - 63px);}
  .side{border-right:1px solid var(--line);overflow:auto;padding:16px;}
  .content{overflow:auto;padding:16px 24px;}
  .controls{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  button{background:var(--panel);color:var(--fg);border:1px solid var(--line);border-radius:8px;padding:8px 12px;cursor:pointer;font-size:13px;}
  button:hover{border-color:var(--accent);}
  button.primary{background:var(--accent);color:#0c0d12;border-color:var(--accent);font-weight:600;}
  textarea{width:100%;height:120px;background:var(--panel);color:var(--fg);border:1px solid var(--line);border-radius:8px;padding:10px;font:13px/1.4 ui-monospace,monospace;resize:vertical;}
  .savings{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:14px;}
  .savings .big{font-size:26px;font-weight:700;color:var(--accent);}
  .savings .lbl{color:var(--mut);font-size:12px;}
  .strand{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:.12s;}
  .strand:hover{border-color:var(--accent);}
  .strand.active{border-color:var(--accent);background:rgba(124,156,255,.08);}
  .strand .name{font-weight:600;display:flex;align-items:center;gap:8px;}
  .strand .dot{width:10px;height:10px;border-radius:50%;flex:none;}
  .strand .meta{color:var(--mut);font-size:12px;margin-top:3px;}
  .msg{border-left:3px solid transparent;padding:8px 12px;margin-bottom:6px;border-radius:0 8px 8px 0;background:var(--panel);}
  .msg.dim{opacity:.25;}
  .msg .role{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.6px;}
  .query{display:flex;gap:8px;margin-bottom:14px;}
  .query input{flex:1;background:var(--panel);color:var(--fg);border:1px solid var(--line);border-radius:8px;padding:8px 12px;}
  .hint{color:var(--mut);font-size:12px;margin:10px 0;}
  .pillbar{font-size:12px;color:var(--mut);margin-bottom:10px;}
</style>
</head>
<body>
<header>
  <h1><span class="tag">Strand</span> — auto-organize one conversation by topic</h1>
  <span class="sub">paste a messy multi-topic thread → it fans into labeled strands. 100% local.</span>
</header>
<main>
  <div class="side">
    <div class="controls">
      <button class="primary" id="sample">Load sample</button>
      <button id="organize">Organize ▸</button>
    </div>
    <textarea id="input" placeholder="Paste a conversation… &#10;User: ... &#10;Assistant: ..."></textarea>
    <div class="savings" id="savings" style="display:none;"></div>
    <div id="strands"></div>
  </div>
  <div class="content">
    <div class="query">
      <input id="q" placeholder="Ask something — Strand routes it to the relevant strand…" />
      <button id="ask">Route</button>
      <button id="liveToggle" title="Type messages one at a time and watch routing">▶ Live mode</button>
      <button id="memToggle" title="Search across many past conversations at once">▶ Memory</button>
    </div>
    <div class="query" id="liveRow" style="display:none;">
      <input id="liveInput" placeholder="Live: type a message and Send — watch it get routed in real time…" />
      <button id="liveSend" class="primary">Send</button>
      <button id="liveReset">Reset</button>
    </div>
    <div class="query" id="memRow" style="display:none;">
      <input id="memInput" placeholder="Memory: search across ALL past conversations — try 'broker adapter parity test'…" />
      <button id="memSearch" class="primary">Search</button>
    </div>
    <div class="pillbar" id="status">Load the sample, then Organize. Or switch to Live mode.</div>
    <div id="messages"></div>
  </div>
</main>
<script type="module" src="./app.js"></script>
</body>
</html>
